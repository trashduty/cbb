<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBB Model Outputs</title>
    <!-- Papa Parse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 20px;
            background-color: #f4f7f6;
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        #teamSearch {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 250px;
            font-size: 0.9rem;
        }
        .table-container {
            overflow-x: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
            background: white;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 0.85rem;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            white-space: nowrap;
        }
        th {
            background-color: #2c3e50;
            color: white;
            position: sticky;
            top: 0;
            cursor: pointer;
            user-select: none;
        }
        th:after {
            content: ' \21D5';
            font-size: 0.7rem;
            opacity: 0.5;
        }
        tr:hover td {
            background-color: rgba(0,0,0,0.04) !important;
        }
        .last-updated {
            margin-bottom: 10px;
            font-style: italic;
            color: #666;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="last-updated" id="status">Loading data...</div>
    <div class="controls">
        <input type="text" id="teamSearch" placeholder="Search by team name..." oninput="onFilterChange()">
    </div>
    <div class="table-container">
        <table id="oddsTable">
            <thead><tr id="tableHead"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://raw.githubusercontent.com/trashduty/cbb/main/MM_Output_Final.csv';
        const REFRESH_INTERVAL = 60000;

        let rawData = [];
        let sortConfig = { key: null, direction: 'asc' };

        const columnMapping = [
            { csv: 'Game',                       display: 'Game',                       type: 'text' },
            { csv: 'Game Time',                  display: 'Game Time',                  type: 'text' },
            { csv: 'Team',                       display: 'Team',                       type: 'text' },
            { csv: 'market_spread',              display: 'Market Spread',              type: 'decimal' },
            { csv: 'Opening Spread',             display: 'Opening Spread',             type: 'decimal' },
            { csv: 'Predicted Outcome',          display: 'Predicted Outcome',          type: 'decimal' },
            { csv: 'Spread Cover Probability',   display: 'Spread Cover Probability',   type: 'probability' },
            { csv: 'Edge For Covering Spread',   display: 'Edge For Covering Spread',   type: 'spread_edge' },
            { csv: 'Opening Moneyline',          display: 'Opening Moneyline',          type: 'decimal' },
            { csv: 'Current Moneyline',          display: 'Current Moneyline',          type: 'decimal' },
            { csv: 'Moneyline Win Probability',  display: 'Moneyline Win Probability',  type: 'probability' },
            { csv: 'Moneyline Edge',             display: 'Moneyline Edge',             type: 'ml_edge' },
            { csv: 'market_total',               display: 'Market Total',               type: 'decimal' },
            { csv: 'model_total',                display: 'Model Total',                type: 'decimal' },
            { csv: 'Opening Total',              display: 'Opening Total',              type: 'decimal' },
            { csv: 'theoddsapi_total',           display: 'Market Total',               type: 'decimal' },
            { csv: 'Over Cover Probability',     display: 'Over Cover Probability',     type: 'probability' },
            { csv: 'Under Cover Probability',    display: 'Under Cover Probability',    type: 'probability' },
            { csv: 'Over Total Edge',            display: 'Over Total Edge',            type: 'total_edge' },
            { csv: 'Under Total Edge',           display: 'Under Total Edge',           type: 'total_edge' }
        ];

        function getGradientColor(value, threshold) {
            const pct = value * 100;
            const diff = pct - threshold;
            if (diff >= 0) {
                // Green: same as before
                const lightness = Math.max(95 - diff * 8, 30);
                return `hsl(120, 70%, ${lightness}%)`;
            } else {
                // Red: increased lightness floor from 30 to 65 for better readability
                const lightness = Math.max(95 - Math.abs(diff) * 8, 65);
                return `hsl(0, 80%, ${lightness}%)`;
            }
        }

        function formatValue(value, type) {
            if (value === null || value === undefined || value === '') return '';
            if (type === 'probability' || type === 'spread_edge' || type === 'ml_edge' || type === 'total_edge') {
                return (Number(value) * 100).toFixed(2) + '%';
            }
            if (type === 'decimal') {
                return Number(value).toFixed(2);
            }
            return value;
        }

        function updateTable() {
            fetch(CSV_URL + '?t=' + Date.now())
                .then(function(response) {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.text();
                })
                .then(function(csvText) {
                    Papa.parse(csvText, {
                        header: true,
                        dynamicTyping: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            rawData = results.data;
                            renderTable();
                            document.getElementById('status').textContent =
                                'Last updated: ' + new Date().toLocaleTimeString();
                        }
                    });
                })
                .catch(function(err) {
                    document.getElementById('status').textContent = 'Error loading data: ' + err.message;
                });
        }

        function onSort(key) {
            if (sortConfig.key === key) {
                sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortConfig.key = key;
                sortConfig.direction = 'asc';
            }
            renderTable();
        }

        function onFilterChange() {
            renderTable();
        }

        function renderTable() {
            var head = document.getElementById('tableHead');
            var body = document.getElementById('tableBody');
            var searchTerm = document.getElementById('teamSearch').value.toLowerCase();
            
            head.innerHTML = '';
            body.innerHTML = '';
            
            if (!rawData || rawData.length === 0) return;

            var activeCols = columnMapping.filter(function(col) {
                return Object.prototype.hasOwnProperty.call(rawData[0], col.csv);
            });

            // Headers
            activeCols.forEach(function(col) {
                var th = document.createElement('th');
                th.textContent = col.display;
                th.onclick = function() { onSort(col.csv); };
                head.appendChild(th);
            });

            // Filter & Sort
            let processedData = rawData.filter(row => {
                const team = (row['Team'] || '').toString().toLowerCase();
                return team.includes(searchTerm);
            });

            if (sortConfig.key) {
                processedData.sort((a, b) => {
                    let valA = a[sortConfig.key];
                    let valB = b[sortConfig.key];
                    if (valA === valB) return 0;
                    if (valA === null) return 1;
                    if (valB === null) return -1;
                    
                    let comparison = valA < valB ? -1 : 1;
                    return sortConfig.direction === 'asc' ? comparison : -comparison;
                });
            }

            // Rows
            processedData.forEach(function(row) {
                var tr = document.createElement('tr');
                activeCols.forEach(function(col) {
                    var td = document.createElement('td');
                    var val = row[col.csv];
                    td.textContent = formatValue(val, col.type);
                    if (typeof val === 'number') {
                        if (col.type === 'spread_edge' || col.type === 'total_edge') {
                            td.style.backgroundColor = getGradientColor(val, 3);
                        } else if (col.type === 'ml_edge') {
                            td.style.backgroundColor = getGradientColor(val, 10);
                        }
                    }
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
        }

        updateTable();
        setInterval(updateTable, REFRESH_INTERVAL);
    </script>
</body>
</html>
