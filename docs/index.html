<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBB Model Outputs</title>
    <!-- Papa Parse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 20px;
            background-color: #f4f7f6;
        }
        .table-container {
            overflow-x: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
            background: white;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 0.85rem;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            white-space: nowrap;
        }
        th {
            background-color: #2c3e50;
            color: white;
            position: sticky;
            top: 0;
        }
        tr:hover td {
            background-color: rgba(0,0,0,0.04) !important;
        }
        .last-updated {
            margin-bottom: 10px;
            font-style: italic;
            color: #666;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="last-updated" id="status">Loading data...</div>
    <div class="table-container">
        <table id="oddsTable">
            <thead><tr id="tableHead"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = '../MM_Output_Final.csv';
        const REFRESH_INTERVAL = 60000;

        const columnMapping = [
            { csv: 'Game',                       display: 'Game',                       type: 'text' },
            { csv: 'Game Time',                  display: 'Game Time',                  type: 'text' },
            { csv: 'Team',                       display: 'Team',                       type: 'text' },
            { csv: 'market_spread',              display: 'Market Spread',              type: 'decimal' },
            { csv: 'Opening Spread',             display: 'Opening Spread',             type: 'decimal' },
            { csv: 'Predicted Outcome',          display: 'Predicted Outcome',          type: 'decimal' },
            { csv: 'Spread Cover Probability',   display: 'Spread Cover Probability',   type: 'probability' },
            { csv: 'Edge For Covering Spread',   display: 'Edge For Covering Spread',   type: 'spread_edge' },
            { csv: 'Opening Moneyline',          display: 'Opening Moneyline',          type: 'decimal' },
            { csv: 'Current Moneyline',          display: 'Current Moneyline',          type: 'decimal' },
            { csv: 'Moneyline Win Probability',  display: 'Moneyline Win Probability',  type: 'probability' },
            { csv: 'Moneyline Edge',             display: 'Moneyline Edge',             type: 'ml_edge' },
            { csv: 'market_total',               display: 'Market Total',               type: 'decimal' },
            { csv: 'model_total',                display: 'Model Total',                type: 'decimal' },
            { csv: 'Opening Total',              display: 'Opening Total',              type: 'decimal' },
            { csv: 'theoddsapi_total',           display: 'Market Total',               type: 'decimal' },
            { csv: 'Over Cover Probability',     display: 'Over Cover Probability',     type: 'probability' },
            { csv: 'Under Cover Probability',    display: 'Under Cover Probability',    type: 'probability' },
            { csv: 'Over Total Edge',            display: 'Over Total Edge',            type: 'total_edge' },
            { csv: 'Under Total Edge',           display: 'Under Total Edge',           type: 'total_edge' }
        ];

        // Returns a green/red background color.
        // threshold is in percentage points (e.g., 3 means 3%).
        // value is a float (e.g., 0.045 for 4.5%).
        function getGradientColor(value, threshold) {
            const pct = value * 100;
            const diff = pct - threshold;
            if (diff >= 0) {
                // Green: lightness decreases (darker) as edge increases above threshold
                const lightness = Math.max(95 - diff * 8, 30);
                return `hsl(120, 70%, ${lightness}%)`;
            } else {
                // Pink/red: lightness decreases (darker) as edge drops below threshold
                const lightness = Math.max(95 - Math.abs(diff) * 8, 30);
                return `hsl(0, 80%, ${lightness}%)`;
            }
        }

        function formatValue(value, type) {
            if (value === null || value === undefined || value === '') return '';
            if (type === 'probability' || type === 'spread_edge' || type === 'ml_edge' || type === 'total_edge') {
                return (Number(value) * 100).toFixed(2) + '%';
            }
            if (type === 'decimal') {
                return Number(value).toFixed(2);
            }
            return value;
        }

        function updateTable() {
            fetch(CSV_URL + '?t=' + Date.now())
                .then(function(response) {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.text();
                })
                .then(function(csvText) {
                    Papa.parse(csvText, {
                        header: true,
                        dynamicTyping: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            renderTable(results.data);
                            document.getElementById('status').textContent =
                                'Last updated: ' + new Date().toLocaleTimeString();
                        }
                    });
                })
                .catch(function(err) {
                    document.getElementById('status').textContent = 'Error loading data: ' + err.message;
                });
        }

        function renderTable(data) {
            var head = document.getElementById('tableHead');
            var body = document.getElementById('tableBody');
            head.innerHTML = '';
            body.innerHTML = '';

            if (!data || data.length === 0) return;

            // Only include columns present in the CSV
            var activeCols = columnMapping.filter(function(col) {
                return Object.prototype.hasOwnProperty.call(data[0], col.csv);
            });

            // Build header row
            activeCols.forEach(function(col) {
                var th = document.createElement('th');
                th.textContent = col.display;
                head.appendChild(th);
            });

            // Build data rows
            data.forEach(function(row) {
                var tr = document.createElement('tr');
                activeCols.forEach(function(col) {
                    var td = document.createElement('td');
                    var val = row[col.csv];

                    td.textContent = formatValue(val, col.type);

                    if (typeof val === 'number') {
                        if (col.type === 'spread_edge' || col.type === 'total_edge') {
                            td.style.backgroundColor = getGradientColor(val, 3);
                        } else if (col.type === 'ml_edge') {
                            td.style.backgroundColor = getGradientColor(val, 10);
                        }
                    }

                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
        }

        updateTable();
        setInterval(updateTable, REFRESH_INTERVAL);
    </script>
</body>
</html>
