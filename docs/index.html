<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CBB Model Outputs</title>

  <!-- Papa Parse for CSV parsing -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 20px;
      background-color: #f4f7f6;
    }

    .last-updated {
      margin-bottom: 10px;
      font-style: italic;
      color: #666;
      font-size: 0.8rem;
    }

    .controls {
      margin-bottom: 14px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover { background: #f4f4f4; }

    .team-summary {
      font-size: 0.9rem;
      color: #333;
      padding-top: 8px;
    }

    .team-picker {
      width: 360px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.06);
      overflow: hidden;
      margin-top: 10px;
    }

    .team-picker[hidden] { display: none; }

    .team-picker-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid #eee;
      background: #fafafa;
      gap: 10px;
      flex-wrap: wrap;
    }

    #teamFilter {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: 220px;
      font-size: 0.9rem;
      background: #fff;
    }

    .team-picker-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .team-list {
      max-height: 220px;
      overflow: auto;
      padding: 8px 10px;
    }

    .team-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 2px;
      font-size: 0.9rem;
      border-bottom: 1px dashed rgba(0,0,0,0.06);
    }
    .team-item:last-child { border-bottom: none; }

    .team-count {
      font-size: 0.85rem;
      color: #555;
      padding: 8px 10px 10px 10px;
      border-top: 1px solid #eee;
      background: #fafafa;
    }

    .table-container {
      overflow-x: auto;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      border-radius: 8px;
      background: white;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.85rem;
    }

    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #ddd;
      white-space: nowrap;
    }

    th {
      background-color: #2c3e50;
      color: white;
      position: sticky;
      top: 0;
      cursor: pointer;
      user-select: none;
    }

    th:after {
      content: ' \21D5';
      font-size: 0.7rem;
      opacity: 0.5;
    }

    tr:hover td {
      background-color: rgba(0,0,0,0.04) !important;
    }
  </style>
</head>

<body>
  <div class="last-updated" id="status">Loading data...</div>
  <div style="margin-bottom:10px;font-size:0.85rem;">
    Showing: <strong>All games</strong> &nbsp;|&nbsp;
    <a href="non_mm_index.html">Non-March Madness games only →</a>
  </div>

  <div class="controls">
    <div>
      <button type="button" id="toggleTeamPickerBtn" onclick="toggleTeamPicker()">
        Select teams…
      </button>
    </div>
    <div class="team-summary" id="teamSummary">All teams</div>
  </div>

  <!-- Collapsed by default -->
  <div class="team-picker" id="teamPicker" hidden>
    <div class="team-picker-header">
      <input id="teamFilter" type="text" placeholder="Type to find teams..." oninput="onTeamFilterInput()" />

      <div class="team-picker-actions">
        <button type="button" onclick="selectVisibleTeams()">Select visible</button>
        <button type="button" onclick="clearTeamSelection()">Clear</button>
        <button type="button" onclick="toggleTeamPicker(false)">Close</button>
      </div>
    </div>

    <div class="team-list" id="teamList"></div>
    <div class="team-count" id="teamCount">Teams: 0 • Selected: 0</div>
  </div>

  <div class="table-container">
    <table id="oddsTable">
      <thead><tr id="tableHead"></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script>
    const CSV_URL = 'https://raw.githubusercontent.com/trashduty/cbb/main/MM_Output_Final.csv';
    const MM_VALIDATION_URL = 'https://raw.githubusercontent.com/trashduty/cbb/main/MM_output.csv';
    const CROSSWALK_URL = 'https://raw.githubusercontent.com/trashduty/cbb/main/CBBAPI_crosswalk.csv';
    const GAME_SEPARATOR = ' vs. ';
    const REFRESH_INTERVAL = 60000;

    let rawData = [];
    let allTeams = [];
    let selectedTeams = new Set(); // team names as strings
    let sortConfig = { key: null, direction: 'asc' };
    let validGamePairs = null; // Set of "teamA|teamB" strings; null = not yet loaded

    const columnMapping = [
      { csv: 'Game',                      display: 'Game',                    type: 'text' },
      { csv: 'Game Time',                 display: 'Game Time',               type: 'text' },
      { csv: 'Team',                      display: 'Team',                    type: 'text' },
      { csv: 'market_spread',             display: 'Market Spread',           type: 'decimal' },
      { csv: 'Opening Spread',            display: 'Opening Spread',          type: 'decimal' },
      { csv: 'Predicted Outcome',         display: 'Predicted Outcome',       type: 'decimal' },
      { csv: 'Spread Cover Probability',  display: 'Spread Cover Probability',type: 'probability' },
      { csv: 'Edge For Covering Spread',  display: 'Edge For Covering Spread',type: 'spread_edge' },

      { csv: 'Current Moneyline',         display: 'Market Moneyline',        type: 'decimal' },
      { csv: 'Opening Moneyline',         display: 'Opening Moneyline',       type: 'decimal' },
      { csv: 'Moneyline Win Probability', display: 'Moneyline Win Probability',type: 'probability' },
      { csv: 'Moneyline Edge',            display: 'Moneyline Edge',          type: 'ml_edge' },

      { csv: 'market_total',              display: 'Market Total',            type: 'decimal' },
      { csv: 'Opening Total',             display: 'Opening Total',           type: 'decimal' },
      { csv: 'average_total',               display: 'Model Total',             type: 'decimal' },

      { csv: 'Over Cover Probability',    display: 'Over Cover Probability',  type: 'probability' },
      { csv: 'Under Cover Probability',   display: 'Under Cover Probability', type: 'probability' },
      { csv: 'Over Total Edge',           display: 'Over Total Edge',         type: 'total_edge' },
      { csv: 'Under Total Edge',          display: 'Under Total Edge',        type: 'total_edge' }
    ];

    function toggleTeamPicker(forceOpen) {
      const picker = document.getElementById('teamPicker');
      const isHidden = picker.hasAttribute('hidden');

      const open = (typeof forceOpen === 'boolean') ? forceOpen : isHidden;
      if (open) {
        picker.removeAttribute('hidden');
        // Focus filter for convenience
        setTimeout(() => document.getElementById('teamFilter')?.focus(), 0);
      } else {
        picker.setAttribute('hidden', '');
      }
    }

    function getEdgeGradientColor(value, thresholdPctPoints) {
      const pct = value * 100;
      const diff = pct - thresholdPctPoints;

      if (diff >= 0) {
        const lightness = Math.max(95 - diff * 8, 30);
        return `hsl(120, 70%, ${lightness}%)`;
      }

      const lightness = Math.max(95 - Math.abs(diff) * 8, 75);
      return `hsl(0, 80%, ${lightness}%)`;
    }

    function getMLGradientColor(value) {
      const pct = value * 100;

      if (pct >= 10) {
        const lightness = Math.max(95 - (pct - 10) * 8, 30);
        return `hsl(120, 70%, ${lightness}%)`;
      }

      if (pct >= 0) {
        const lightness = Math.max(92 - (10 - pct) * 1.2, 78);
        return `hsl(340, 100%, ${lightness}%)`;
      }

      const lightness = Math.max(92 - Math.abs(pct) * 5, 75);
      return `hsl(0, 85%, ${lightness}%)`;
    }

    function formatValue(value, type) {
      if (value === null || value === undefined || value === '') return '';
      if (type === 'probability' || type === 'spread_edge' || type === 'ml_edge' || type === 'total_edge') {
        return (Number(value) * 100).toFixed(2) + '%';
      }
      if (type === 'decimal') return Number(value).toFixed(2);
      return value;
    }

    function loadValidGames() {
      return Promise.all([
        fetch(MM_VALIDATION_URL + '?t=' + Date.now()).then(r => { if (!r.ok) throw new Error('Failed to fetch MM_output.csv: HTTP ' + r.status); return r.text(); }),
        fetch(CROSSWALK_URL + '?t=' + Date.now()).then(r => { if (!r.ok) throw new Error('Failed to fetch CBBAPI_crosswalk.csv: HTTP ' + r.status); return r.text(); })
      ]).then(function(texts) {
        var mmText = texts[0], xwalkText = texts[1];

        // Build crosswalk: TEAMID → API team name
        var idToName = {};
        Papa.parse(xwalkText, {
          header: true,
          skipEmptyLines: true,
          complete: function(results) {
            results.data.forEach(function(row) {
              var id = row['TEAMID'];
              var name = (row['API'] || '').trim();
              if (id && name) {
                var normalized = normalizeTeamId(id);
                if (normalized !== null) idToName[normalized] = name;
              }
            });
          }
        });

        // Build set of valid "teamA|teamB" game pairs from MM_output.csv
        validGamePairs = new Set();
        Papa.parse(mmText, {
          header: true,
          skipEmptyLines: true,
          complete: function(results) {
            results.data.forEach(function(row) {
              var teamId = normalizeTeamId(row['Team']);
              var oppId  = normalizeTeamId(row['Opp']);
              var teamName = teamId !== null ? idToName[teamId] : undefined;
              var oppName  = oppId  !== null ? idToName[oppId]  : undefined;
              if (teamName && oppName) {
                validGamePairs.add(teamName + GAME_SEPARATOR + oppName);
                validGamePairs.add(oppName  + GAME_SEPARATOR + teamName);
              }
            });
          }
        });
      }).catch(function(err) {
        console.warn('Could not load valid games list; displaying all rows:', err.message);
        validGamePairs = null;
      });
    }

    function normalizeTeamId(value) {
      try {
        var n = Math.round(parseFloat(value));
        return isNaN(n) ? null : String(n);
      } catch(e) {
        return null;
      }
    }

    function isValidRow(row) {
      if (validGamePairs === null) return true; // fall back: no filtering
      var game = (row['Game'] || '').trim();
      if (!game) return false;
      var parts = game.split(GAME_SEPARATOR);
      if (parts.length !== 2) return false;
      return validGamePairs.has(parts[0].trim() + GAME_SEPARATOR + parts[1].trim());
    }

    function parseGameTimeET(timeStr) {
      // Parse "Mar 20 06:50PM ET" as Eastern Time and return a UTC Date object.
      if (!timeStr) return null;
      var match = String(timeStr).trim().match(/^(\w{3})\s+(\d{1,2})\s+(\d{1,2}):(\d{2})(AM|PM)\s+ET$/i);
      if (!match) return null;
      var MONTHS = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
      var mon = MONTHS[(match[1] || '').toLowerCase()];
      if (!mon) return null;
      var year = new Date().getFullYear();
      var day  = parseInt(match[2], 10);
      var hour = parseInt(match[3], 10);
      var min  = parseInt(match[4], 10);
      var ampm = (match[5] || '').toUpperCase();
      if (ampm === 'PM' && hour !== 12) hour += 12;
      if (ampm === 'AM' && hour === 12) hour = 0;
      // Determine ET offset: EDT = UTC-4, EST = UTC-5
      // DST starts 2nd Sunday of March at 2 AM, ends 1st Sunday of November at 2 AM
      var marchFirst = new Date(year, 2, 1);
      var dstStartDay = 1 + (7 - marchFirst.getDay()) % 7 + 7;
      var novFirst = new Date(year, 10, 1);
      var dstEndDay = 1 + (7 - novFirst.getDay()) % 7;
      var isDST = false;
      if (mon > 3 && mon < 11) {
        isDST = true;
      } else if (mon === 3) {
        isDST = (day > dstStartDay) || (day === dstStartDay && hour >= 2);
      } else if (mon === 11) {
        isDST = (day < dstEndDay) || (day === dstEndDay && hour < 2);
      }
      var utcOffset = isDST ? 4 : 5;
      return new Date(Date.UTC(year, mon - 1, day, hour + utcOffset, min));
    }

    function updateTableFromCSV() {
      fetch(CSV_URL + '?t=' + Date.now())
        .then((response) => {
          if (!response.ok) throw new Error('HTTP ' + response.status);
          return response.text();
        })
        .then((csvText) => {
          Papa.parse(csvText, {
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            complete: function (results) {
              rawData = (results.data || []).filter(isValidRow);
              hydrateTeams();
              renderTeamPicker();
              renderTable();
              updateTeamSummary();

              document.getElementById('status').textContent =
                'Last updated: ' + new Date().toLocaleTimeString();
            }
          });
        })
        .catch((err) => {
          document.getElementById('status').textContent = 'Error loading data: ' + err.message;
        });
    }

    function hydrateTeams() {
      const set = new Set();
      rawData.forEach(row => {
        const t = (row['Team'] || '').toString().trim();
        if (t) set.add(t);
      });

      allTeams = Array.from(set).sort((a, b) => a.localeCompare(b));

      const existing = new Set(allTeams);
      selectedTeams.forEach(t => { if (!existing.has(t)) selectedTeams.delete(t); });
    }

    function onTeamFilterInput() {
      renderTeamPicker();
    }

    function onTeamToggle(team, isChecked) {
      if (isChecked) selectedTeams.add(team);
      else selectedTeams.delete(team);

      updateTeamCount();
      updateTeamSummary();
      renderTable();
    }

    function clearTeamSelection() {
      selectedTeams.clear();
      document.getElementById('teamFilter').value = '';
      renderTeamPicker();
      updateTeamSummary();
      renderTable();
    }

    function selectVisibleTeams() {
      const filterText = document.getElementById('teamFilter').value.toLowerCase().trim();
      const visible = allTeams.filter(t => t.toLowerCase().includes(filterText));
      visible.forEach(t => selectedTeams.add(t));
      renderTeamPicker();
      updateTeamSummary();
      renderTable();
    }

    function updateTeamCount() {
      document.getElementById('teamCount').textContent =
        `Teams: ${allTeams.length} • Selected: ${selectedTeams.size}`;
    }

    function updateTeamSummary() {
      const el = document.getElementById('teamSummary');
      if (selectedTeams.size === 0) {
        el.textContent = 'All teams';
        return;
      }
      el.textContent = `${selectedTeams.size} team${selectedTeams.size === 1 ? '' : 's'} selected`;
    }

    function renderTeamPicker() {
      const container = document.getElementById('teamList');
      const filterText = document.getElementById('teamFilter').value.toLowerCase().trim();

      container.innerHTML = '';
      const filteredTeams = allTeams.filter(t => t.toLowerCase().includes(filterText));

      filteredTeams.forEach(team => {
        const id = 'team_' + team.replace(/[^a-z0-9]/gi, '_');

        const row = document.createElement('div');
        row.className = 'team-item';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.id = id;
        cb.checked = selectedTeams.has(team);
        cb.onchange = () => onTeamToggle(team, cb.checked);

        const label = document.createElement('label');
        label.htmlFor = id;
        label.textContent = team;

        row.appendChild(cb);
        row.appendChild(label);
        container.appendChild(row);
      });

      updateTeamCount();
    }

    function onSort(key) {
      if (sortConfig.key === key) {
        sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
      } else {
        sortConfig.key = key;
        sortConfig.direction = 'asc';
      }
      renderTable();
    }

    function renderTable() {
      const head = document.getElementById('tableHead');
      const body = document.getElementById('tableBody');

      head.innerHTML = '';
      body.innerHTML = '';

      if (!rawData || rawData.length === 0) return;

      const activeCols = columnMapping.filter(col =>
        Object.prototype.hasOwnProperty.call(rawData[0], col.csv)
      );

      activeCols.forEach(col => {
        const th = document.createElement('th');
        th.textContent = col.display;
        th.onclick = () => onSort(col.csv);
        head.appendChild(th);
      });

      let processedData = rawData;
      if (selectedTeams.size > 0) {
        processedData = rawData.filter(row => selectedTeams.has((row['Team'] || '').toString().trim()));
      }

      // Filter out games that started more than 5 minutes ago (times in CSV are Eastern Time)
      const now = Date.now();
      processedData = processedData.filter(row => {
        const gameTime = parseGameTimeET(row['Game Time']);
        if (!gameTime) return true; // keep row if time can't be parsed
        return now < gameTime.getTime() + 5 * 60 * 1000;
      });

      if (sortConfig.key) {
        processedData = processedData.slice().sort((a, b) => {
          const valA = a[sortConfig.key];
          const valB = b[sortConfig.key];

          if (valA === valB) return 0;
          if (valA === null || valA === undefined) return 1;
          if (valB === null || valB === undefined) return -1;

          let comparison;
          if (typeof valA === 'number' && typeof valB === 'number') {
            comparison = valA < valB ? -1 : 1;
          } else {
            comparison = valA.toString().localeCompare(valB.toString());
          }

          return sortConfig.direction === 'asc' ? comparison : -comparison;
        });
      }

      processedData.forEach(row => {
        const tr = document.createElement('tr');

        activeCols.forEach(col => {
          const td = document.createElement('td');
          const val = row[col.csv];

          td.textContent = formatValue(val, col.type);

          if (typeof val === 'number') {
            if (col.type === 'spread_edge' || col.type === 'total_edge') {
              td.style.backgroundColor = getEdgeGradientColor(val, 3);
            } else if (col.type === 'ml_edge') {
              td.style.backgroundColor = getMLGradientColor(val);
            }
          }

          tr.appendChild(td);
        });

        body.appendChild(tr);
      });
    }

    loadValidGames().then(function() {
      updateTableFromCSV();
      setInterval(updateTableFromCSV, REFRESH_INTERVAL);
    });
  </script>
</body>
</html>
